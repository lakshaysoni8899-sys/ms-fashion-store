<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MS Fashion</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-xl);
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--accent-color) 100%);
        }
        .login-card {
            background: var(--surface-color);
            padding: var(--spacing-xxl);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease-out;
        }
        .login-card .logo {
            display: block;
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        .form-group {
            margin-bottom: var(--spacing-lg);
        }
        .form-label {
            display: block;
            margin-bottom: var(--spacing-xs);
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-family: var(--font-body);
            transition: var(--transition-normal);
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(92, 29, 42, 0.1);
        }
        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 0.75rem;
            border-radius: var(--border-radius);
            font-size: 0.875rem;
            margin-bottom: var(--spacing-md);
            display: none;
            align-items: center;
            gap: 8px;
        }
        .error-message.show {
            display: flex;
            animation: shake 0.4s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="logo">MS FASHION</a>
            <div id="login-error" class="error-message">
                <i class='bx bx-error-circle'></i>
                <span id="login-error-text">Invalid username or password.</span>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary full-width">Sign In</button>
            </form>
            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                <a href="index.html" style="color: var(--text-secondary);"><i class='bx bx-arrow-back'></i> Back to Store</a>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/auth.js"></script>
</body>
</html>
